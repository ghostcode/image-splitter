<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片分割工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #08080c;
      --bg-secondary: #0e0e14;
      --fg: #e8e8ed;
      --muted: #5a5a6e;
      --accent: #00ff88;
      --accent-secondary: #00ccff;
      --accent-dim: rgba(0, 255, 136, 0.12);
      --card: #111118;
      --border: #1e1e2a;
      --danger: #ff4757;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 255, 136, 0.08), transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0, 204, 255, 0.05), transparent),
        linear-gradient(180deg, var(--bg) 0%, #0a0a10 100%);
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .animate-fade-up {
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    .delay-1 {
      animation-delay: 0.1s;
    }

    .delay-2 {
      animation-delay: 0.2s;
    }

    .delay-3 {
      animation-delay: 0.3s;
    }

    .delay-4 {
      animation-delay: 0.4s;
    }

    @media (prefers-reduced-motion: reduce) {
      .animate-fade-up {
        animation: none;
        opacity: 1;
      }
    }

    .upload-zone {
      border: 2px dashed var(--border);
      background: linear-gradient(135deg, var(--card) 0%, rgba(17, 17, 24, 0.5) 100%);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .upload-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.05), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s;
    }

    .upload-zone:hover::before {
      transform: translateX(100%);
    }

    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
      transform: scale(1.01);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, #00dd77 100%);
      color: var(--bg);
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 255, 136, 0.35);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      filter: grayscale(0.5);
    }

    .btn-secondary {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--fg);
      transition: all 0.25s ease;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }

    .btn-icon {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--fg);
      transition: all 0.25s ease;
    }

    .btn-icon:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 20px var(--accent-dim);
    }

    .btn-icon:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-icon.loading .icon-default {
      display: none;
    }

    .btn-icon.loading .icon-loading {
      display: block;
      animation: spin 1s linear infinite;
    }

    .btn-icon:not(.loading) .icon-default {
      display: block;
    }

    .btn-icon:not(.loading) .icon-loading {
      display: none;
    }

    .input-field {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--fg);
      transition: all 0.25s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-dim), 0 0 20px var(--accent-dim);
    }

    .card {
      background: linear-gradient(135deg, var(--card) 0%, rgba(14, 14, 20, 0.8) 100%);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .preview-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 300px;
    }

    .preview-grid {
      display: grid;
      gap: 3px;
      background: var(--border);
      padding: 3px;
      border-radius: 12px;
      max-width: 100%;
      max-height: 60vh;
    }

    .grid-cell {
      position: relative;
      overflow: hidden;
      background: var(--bg);
      border-radius: 4px;
    }

    .grid-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cell-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0, 255, 136, 0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .grid-cell:hover .cell-overlay {
      opacity: 1;
    }

    .cell-number {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(0, 0, 0, 0.8);
      color: var(--accent);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(0, 255, 136, 0.2);
    }

    .result-item {
      position: relative;
      cursor: pointer;
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .result-item:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 12px 30px rgba(0, 255, 136, 0.2);
    }

    .result-item img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .result-item .download-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .result-item:hover .download-icon {
      opacity: 1;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    *:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .stat-value {
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Progress Bar */
    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--card);
      border: 1px solid var(--border);
      padding: 16px 24px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 1000;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.success {
      border-color: var(--accent);
    }
  </style>
</head>

<body>
  <div class="bg-layer"></div>
  <div class="grid-overlay"></div>

  <div class="min-h-screen p-4 md:p-8 lg:p-12">
    <div class="max-w-7xl mx-auto">
      <!-- Header -->
      <header class="text-center mb-12 animate-fade-up">
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full mb-6"
          style="background: var(--accent-dim); border: 1px solid rgba(0,255,136,0.2)">
          <span class="w-2 h-2 rounded-full" style="background: var(--accent); animation: pulse 2s infinite"></span>
          <span class="text-sm mono" style="color: var(--accent)">Image Splitter</span>
        </div>
        <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold tracking-tight mb-4">
          图片<span class="stat-value">分割</span>工具
        </h1>
        <p class="text-lg max-w-xl mx-auto" style="color: var(--muted)">
          上传图片，自定义网格分割，一键导出所有切片
        </p>
      </header>

      <div class="grid lg:grid-cols-5 gap-8">
        <!-- Left Panel -->
        <div class="lg:col-span-2 space-y-6">
          <!-- Upload -->
          <div class="animate-fade-up delay-1">
            <label class="block text-sm font-medium mb-3" style="color: var(--muted)">
              <span class="flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                上传图片
              </span>
            </label>
            <div id="uploadZone" class="upload-zone rounded-2xl p-8 text-center cursor-pointer">
              <input type="file" id="fileInput" accept="image/*" class="hidden" aria-label="选择图片文件">
              <div id="uploadContent">
                <div class="w-20 h-20 mx-auto mb-4 rounded-2xl flex items-center justify-center"
                  style="background: var(--accent-dim)">
                  <svg class="w-10 h-10" style="color: var(--accent)" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                  </svg>
                </div>
                <p class="text-lg font-medium mb-2">拖拽图片到这里</p>
                <p class="text-sm" style="color: var(--muted)">或点击选择文件 · 支持 JPG、PNG、WebP</p>
              </div>
              <div id="uploadedInfo" class="hidden">
                <div class="relative inline-block">
                  <img id="previewThumbnail" class="w-28 h-28 object-cover rounded-xl mx-auto mb-4"
                    style="box-shadow: 0 0 30px var(--accent-dim)" alt="预览缩略图">
                  <div class="absolute -bottom-2 -right-2 w-8 h-8 rounded-full flex items-center justify-center"
                    style="background: var(--accent)">
                    <svg class="w-4 h-4" style="color: var(--bg)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                  </div>
                </div>
                <p id="fileName" class="mono text-sm" style="color: var(--muted)"></p>
                <button id="clearBtn" class="mt-3 text-sm px-4 py-2 rounded-lg transition-colors"
                  style="color: var(--danger); background: rgba(255,71,87,0.1)" onclick="clearImage()">
                  清除图片
                </button>
              </div>
            </div>
          </div>

          <!-- Settings -->
          <div class="animate-fade-up delay-2 card rounded-2xl p-6">
            <h3 class="text-lg font-semibold mb-5 flex items-center gap-2">
              <svg class="w-5 h-5" style="color: var(--accent)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z" />
              </svg>
              分割设置
            </h3>

            <div class="grid grid-cols-2 gap-4 mb-6">
              <div>
                <label class="block text-sm mb-2" style="color: var(--muted)">行数</label>
                <input type="number" id="rows" value="3" min="1" max="20"
                  class="input-field w-full px-4 py-3 rounded-xl mono text-lg" aria-label="行数">
              </div>
              <div>
                <label class="block text-sm mb-2" style="color: var(--muted)">列数</label>
                <input type="number" id="cols" value="3" min="1" max="20"
                  class="input-field w-full px-4 py-3 rounded-xl mono text-lg" aria-label="列数">
              </div>
            </div>

            <!-- Presets -->
            <div class="mb-6">
              <label class="block text-sm mb-3" style="color: var(--muted)">快捷预设</label>
              <div class="grid grid-cols-4 gap-2">
                <button onclick="setGrid(2,2)" class="btn-secondary px-3 py-2 rounded-lg text-sm mono">2×2</button>
                <button onclick="setGrid(3,3)" class="btn-secondary px-3 py-2 rounded-lg text-sm mono">3×3</button>
                <button onclick="setGrid(4,4)" class="btn-secondary px-3 py-2 rounded-lg text-sm mono">4×4</button>
                <button onclick="setGrid(5,5)" class="btn-secondary px-3 py-2 rounded-lg text-sm mono">5×5</button>
                <button onclick="setGrid(2,3)" class="btn-secondary px-3 py-2 rounded-lg text-sm mono">2×3</button>
                <button onclick="setGrid(3,2)" class="btn-secondary px-3 py-2 rounded-lg text-sm mono">3×2</button>
                <button onclick="setGrid(1,3)" class="btn-secondary px-3 py-2 rounded-lg text-sm mono">横三</button>
                <button onclick="setGrid(3,1)" class="btn-secondary px-3 py-2 rounded-lg text-sm mono">竖三</button>
              </div>
            </div>

            <!-- Stats -->
            <div id="splitInfo" class="p-4 rounded-xl" style="background: var(--bg); border: 1px solid var(--border)">
              <div class="grid grid-cols-3 gap-4 text-center">
                <div>
                  <p class="text-3xl font-bold mono stat-value" id="totalPieces">9</p>
                  <p class="text-xs mt-1" style="color: var(--muted)">总块数</p>
                </div>
                <div>
                  <p class="text-3xl font-bold mono stat-value" id="pieceWidth">--</p>
                  <p class="text-xs mt-1" style="color: var(--muted)">单块宽</p>
                </div>
                <div>
                  <p class="text-3xl font-bold mono stat-value" id="pieceHeight">--</p>
                  <p class="text-xs mt-1" style="color: var(--muted)">单块高</p>
                </div>
              </div>
            </div>
          </div>

          <!-- Actions -->
          <div class="animate-fade-up delay-3 flex gap-3">
            <button id="splitBtn" disabled onclick="splitImage()"
              class="btn-primary flex-1 py-4 rounded-xl text-lg font-semibold">
              <span class="flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z" />
                </svg>
                开始分割
              </span>
            </button>
            <button id="downloadAllBtn" disabled onclick="downloadAllAsZip()" class="btn-icon px-6 py-4 rounded-xl"
              aria-label="下载ZIP" title="下载全部切片为ZIP">
              <svg class="w-6 h-6 icon-default" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
              </svg>
              <svg class="w-6 h-6 icon-loading" style="color: var(--accent)" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
              </svg>
            </button>
          </div>

          <!-- Download Info -->
          <div id="downloadInfo" class="hidden animate-fade-up card rounded-xl p-4">
            <div class="flex items-center justify-between mb-2">
              <span class="text-sm" style="color: var(--muted)">正在打包...</span>
              <span id="downloadProgress" class="mono text-sm" style="color: var(--accent)">0%</span>
            </div>
            <div class="progress-bar">
              <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
          </div>
        </div>

        <!-- Right Panel -->
        <div class="lg:col-span-3 animate-fade-up delay-4">
          <div class="sticky top-8">
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-lg font-semibold flex items-center gap-2">
                <svg class="w-5 h-5" style="color: var(--accent)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
                预览
              </h3>
              <span id="previewStatus" class="mono text-sm px-3 py-1 rounded-full"
                style="color: var(--muted); background: var(--card)">等待上传</span>
            </div>

            <div id="previewContainer" class="card rounded-2xl overflow-hidden" style="min-height: 450px">
              <div id="emptyPreview" class="flex items-center justify-center h-96" style="color: var(--muted)">
                <div class="text-center">
                  <div class="w-24 h-24 mx-auto mb-6 rounded-2xl flex items-center justify-center"
                    style="background: var(--bg); border: 2px dashed var(--border)">
                    <svg class="w-12 h-12 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                        d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                  </div>
                  <p class="text-lg font-medium mb-2">暂无预览</p>
                  <p class="text-sm">上传图片后查看分割效果</p>
                </div>
              </div>
              <div id="gridPreview" class="hidden preview-wrapper">
                <div id="previewGrid" class="preview-grid"></div>
              </div>
            </div>

            <!-- Results -->
            <div id="resultList" class="hidden mt-6 card rounded-2xl p-6">
              <div class="flex items-center justify-between mb-4">
                <h4 class="font-semibold flex items-center gap-2">
                  <svg class="w-5 h-5" style="color: var(--accent)" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                  </svg>
                  分割结果
                </h4>
                <span class="mono text-sm px-3 py-1 rounded-full"
                  style="color: var(--accent); background: var(--accent-dim)" id="resultCount"></span>
              </div>
              <p class="text-sm mb-4" style="color: var(--muted)">点击任意切片单独下载，或点击上方ZIP按钮批量下载</p>
              <div id="resultGrid"
                class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-5 gap-3 max-h-64 overflow-y-auto pr-2">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <footer class="text-center mt-16 animate-fade-up delay-4">
        <p class="text-sm" style="color: var(--muted)">
          所有处理均在本地完成，图片不会上传到服务器
        </p>
      </footer>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast">
    <svg id="toastIcon" class="w-5 h-5" style="color: var(--accent)" fill="none" stroke="currentColor"
      viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
    </svg>
    <span id="toastMessage"></span>
  </div>

  <canvas id="processCanvas" class="hidden" aria-hidden="true"></canvas>

  <script>
    let currentImage = null;
    let splitPieces = [];
    let imageWidth = 0;
    let imageHeight = 0;
    let originalFileName = 'image';

    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const uploadContent = document.getElementById('uploadContent');
    const uploadedInfo = document.getElementById('uploadedInfo');
    const previewThumbnail = document.getElementById('previewThumbnail');
    const fileNameEl = document.getElementById('fileName');
    const rowsInput = document.getElementById('rows');
    const colsInput = document.getElementById('cols');
    const splitBtn = document.getElementById('splitBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const emptyPreview = document.getElementById('emptyPreview');
    const gridPreview = document.getElementById('gridPreview');
    const previewGrid = document.getElementById('previewGrid');
    const previewStatus = document.getElementById('previewStatus');
    const resultList = document.getElementById('resultList');
    const resultGrid = document.getElementById('resultGrid');
    const totalPieces = document.getElementById('totalPieces');
    const pieceWidth = document.getElementById('pieceWidth');
    const pieceHeight = document.getElementById('pieceHeight');
    const processCanvas = document.getElementById('processCanvas');
    const ctx = processCanvas.getContext('2d');
    const downloadInfo = document.getElementById('downloadInfo');
    const progressFill = document.getElementById('progressFill');
    const downloadProgress = document.getElementById('downloadProgress');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');

    uploadZone.addEventListener('click', () => fileInput.click());

    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('drag-over');
    });

    uploadZone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        handleFile(file);
      }
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleFile(file);
    });

    function handleFile(file) {
      // 保存原始文件名（不含扩展名）
      originalFileName = file.name.replace(/\.[^/.]+$/, '') || 'image';

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          currentImage = img;
          imageWidth = img.width;
          imageHeight = img.height;
          previewThumbnail.src = e.target.result;
          fileNameEl.textContent = `${file.name} · ${img.width} × ${img.height}`;
          uploadContent.classList.add('hidden');
          uploadedInfo.classList.remove('hidden');
          splitBtn.disabled = false;
          updateSplitInfo();
          updatePreview();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function clearImage() {
      currentImage = null;
      imageWidth = 0;
      imageHeight = 0;
      splitPieces = [];
      originalFileName = 'image';
      uploadContent.classList.remove('hidden');
      uploadedInfo.classList.add('hidden');
      emptyPreview.classList.remove('hidden');
      gridPreview.classList.add('hidden');
      resultList.classList.add('hidden');
      downloadInfo.classList.add('hidden');
      splitBtn.disabled = true;
      downloadAllBtn.disabled = true;
      previewStatus.textContent = '等待上传';
      pieceWidth.textContent = '--';
      pieceHeight.textContent = '--';
      fileInput.value = '';
    }

    [rowsInput, colsInput].forEach(input => {
      input.addEventListener('input', () => {
        if (currentImage) {
          updateSplitInfo();
          updatePreview();
        }
      });
    });

    function setGrid(rows, cols) {
      rowsInput.value = rows;
      colsInput.value = cols;
      if (currentImage) {
        updateSplitInfo();
        updatePreview();
      }
    }

    function updateSplitInfo() {
      const rows = Math.max(1, Math.min(20, parseInt(rowsInput.value) || 1));
      const cols = Math.max(1, Math.min(20, parseInt(colsInput.value) || 1));
      totalPieces.textContent = rows * cols;

      if (currentImage) {
        const w = Math.floor(imageWidth / cols);
        const h = Math.floor(imageHeight / rows);
        pieceWidth.textContent = w + 'px';
        pieceHeight.textContent = h + 'px';
      }
    }

    function updatePreview() {
      if (!currentImage) return;

      const rows = Math.max(1, Math.min(20, parseInt(rowsInput.value) || 1));
      const cols = Math.max(1, Math.min(20, parseInt(colsInput.value) || 1));

      emptyPreview.classList.add('hidden');
      gridPreview.classList.remove('hidden');

      previewStatus.textContent = `${rows} × ${cols} 网格`;
      previewStatus.style.background = 'var(--accent-dim)';
      previewStatus.style.color = 'var(--accent)';

      previewGrid.innerHTML = '';
      previewGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

      const aspectRatio = imageWidth / imageHeight;
      previewGrid.style.aspectRatio = aspectRatio;

      const maxPreviewWidth = Math.min(600, window.innerWidth - 80);
      const previewHeight = maxPreviewWidth / aspectRatio;
      const maxHeight = window.innerHeight * 0.6;

      if (previewHeight > maxHeight) {
        previewGrid.style.width = (maxHeight * aspectRatio) + 'px';
      } else {
        previewGrid.style.width = maxPreviewWidth + 'px';
      }

      const pieceW = imageWidth / cols;
      const pieceH = imageHeight / rows;

      const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';

          if (!reducedMotion) {
            cell.style.opacity = '0';
            cell.style.transform = 'scale(0.8)';
            cell.style.animation = `scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards`;
            cell.style.animationDelay = `${(r * cols + c) * 40}ms`;
          }

          const canvas = document.createElement('canvas');
          const cw = Math.max(1, Math.floor(pieceW));
          const ch = Math.max(1, Math.floor(pieceH));
          canvas.width = cw;
          canvas.height = ch;

          const cellCtx = canvas.getContext('2d');
          cellCtx.drawImage(
            currentImage,
            Math.floor(c * pieceW), Math.floor(r * pieceH), cw, ch,
            0, 0, cw, ch
          );

          const img = document.createElement('img');
          img.src = canvas.toDataURL();
          img.alt = `切片 ${r + 1}-${c + 1}`;
          img.draggable = false;

          const overlay = document.createElement('div');
          overlay.className = 'cell-overlay';

          const number = document.createElement('span');
          number.className = 'cell-number';
          number.textContent = `${r + 1}-${c + 1}`;

          cell.appendChild(img);
          cell.appendChild(overlay);
          cell.appendChild(number);
          previewGrid.appendChild(cell);
        }
      }
    }

    function splitImage() {
      if (!currentImage) return;

      const rows = Math.max(1, Math.min(20, parseInt(rowsInput.value) || 1));
      const cols = Math.max(1, Math.min(20, parseInt(colsInput.value) || 1));

      splitPieces = [];

      const pieceW = imageWidth / cols;
      const pieceH = imageHeight / rows;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cw = Math.max(1, Math.floor(pieceW));
          const ch = Math.max(1, Math.floor(pieceH));
          processCanvas.width = cw;
          processCanvas.height = ch;

          ctx.clearRect(0, 0, cw, ch);
          ctx.drawImage(
            currentImage,
            Math.floor(c * pieceW), Math.floor(r * pieceH), cw, ch,
            0, 0, cw, ch
          );

          // 转为 blob 数据存储
          const dataUrl = processCanvas.toDataURL('image/png');
          splitPieces.push({
            index: r * cols + c + 1,
            row: r + 1,
            col: c + 1,
            dataUrl: dataUrl,
            width: cw,
            height: ch
          });
        }
      }

      showResults();
      downloadAllBtn.disabled = false;
    }

    function showResults() {
      resultList.classList.remove('hidden');
      resultGrid.innerHTML = '';

      document.getElementById('resultCount').textContent = `${splitPieces.length} 个切片`;

      const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      splitPieces.forEach((piece, i) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'result-item';
        wrapper.onclick = () => downloadPiece(piece);
        wrapper.setAttribute('role', 'button');
        wrapper.setAttribute('tabindex', '0');
        wrapper.setAttribute('aria-label', `下载切片 ${piece.index}`);
        wrapper.onkeydown = (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            downloadPiece(piece);
          }
        };

        const img = document.createElement('img');
        img.src = piece.dataUrl;
        img.alt = `切片 ${piece.index}`;
        img.draggable = false;

        const downloadIcon = document.createElement('div');
        downloadIcon.className = 'download-icon';
        downloadIcon.innerHTML = `
                    <svg class="w-6 h-6" style="color: var(--accent)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                `;

        const label = document.createElement('span');
        label.className = 'absolute bottom-1 right-1 text-xs mono px-2 py-0.5 rounded';
        label.style.cssText = 'background: rgba(0,0,0,0.8); color: var(--accent); border: 1px solid rgba(0,255,136,0.3)';
        label.textContent = piece.index;

        wrapper.appendChild(img);
        wrapper.appendChild(downloadIcon);
        wrapper.appendChild(label);
        resultGrid.appendChild(wrapper);

        if (!reducedMotion) {
          wrapper.style.opacity = '0';
          wrapper.style.transform = 'translateY(20px)';
          setTimeout(() => {
            wrapper.style.transition = 'all 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
            wrapper.style.opacity = '1';
            wrapper.style.transform = 'translateY(0)';
          }, i * 50);
        }
      });

      setTimeout(() => {
        resultList.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 300);
    }

    function downloadPiece(piece) {
      const link = document.createElement('a');
      link.download = `${originalFileName}_r${piece.row}_c${piece.col}.png`;
      link.href = piece.dataUrl;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // 显示 Toast 提示
    function showToast(message, type = 'success') {
      toastMessage.textContent = message;
      toast.classList.remove('success', 'error');
      toast.classList.add(type, 'show');

      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // 下载全部为 ZIP
    async function downloadAllAsZip() {
      if (splitPieces.length === 0) return;

      const btn = downloadAllBtn;
      btn.classList.add('loading');
      btn.disabled = true;
      downloadInfo.classList.remove('hidden');

      try {
        const zip = new JSZip();
        const imgFolder = zip.folder(`${originalFileName}_split`);

        // 逐个添加图片到 ZIP
        for (let i = 0; i < splitPieces.length; i++) {
          const piece = splitPieces[i];

          // 将 base64 转换为 Blob
          const base64Data = piece.dataUrl.split(',')[1];
          const fileName = `${originalFileName}_r${piece.row}_c${piece.col}.png`;

          imgFolder.file(fileName, base64Data, { base64: true });

          // 更新进度
          const progress = Math.round(((i + 1) / splitPieces.length) * 100);
          progressFill.style.width = progress + '%';
          downloadProgress.textContent = progress + '%';

          // 让 UI 有时间更新
          await new Promise(resolve => setTimeout(resolve, 10));
        }

        // 生成 ZIP 文件
        progressFill.style.width = '100%';
        downloadProgress.textContent = '打包中...';

        const content = await zip.generateAsync({
          type: 'blob',
          compression: 'DEFLATE',
          compressionOptions: { level: 6 }
        }, (metadata) => {
          // 压缩进度
          const progress = Math.round(metadata.percent);
          progressFill.style.width = progress + '%';
        });

        // 下载 ZIP
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `${originalFileName}_split.zip`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);

        showToast(`已导出 ${splitPieces.length} 个切片`, 'success');

      } catch (error) {
        console.error('ZIP generation failed:', error);
        showToast('打包失败，请重试', 'error');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
        setTimeout(() => {
          downloadInfo.classList.add('hidden');
          progressFill.style.width = '0%';
        }, 1000);
      }
    }

    // 响应窗口大小变化
    window.addEventListener('resize', () => {
      if (currentImage) {
        updatePreview();
      }
    });

    updateSplitInfo();
  </script>
</body>

</html>
